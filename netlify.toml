[functions]
  directory = "netlify/functions"

[dev]
  functions = "netlify/functions"

[build]
  node_version = "18"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/health-deps"
  to = "/.netlify/functions/health-deps"
  status = 200
